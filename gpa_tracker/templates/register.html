{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <div class="card p-4">
      <h4 class="text-center mb-1">📝 Register</h4>
      <p class="text-center text-muted mb-4">Create your account</p>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" name="name" class="form-control" placeholder="Your name" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" placeholder="Enter email" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Create password" required>
        </div>
        <button class="btn btn-success w-100 py-2">Create Account</button>
      </form>
      <p class="text-center mt-3 mb-0 small">
        Have account? <a href="{{ url_for('auth.login') }}">Login here</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
